<!doctype html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>درايف RENT - بدون اتصال</title>
  <meta name="theme-color" content="#5C35E2" />
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap');
    body{margin:0;background:#07080F;color:#fff;font-family:'Cairo',sans-serif;display:grid;place-items:center;min-height:100vh;padding:24px;text-align:center;}
    .card{max-width:380px;background:rgba(255,255,255,.045);border:1px solid rgba(124,58,237,.22);border-radius:26px;padding:28px 22px;box-shadow:0 24px 60px rgba(0,0,0,.45);}
    img{width:82px;height:82px;border-radius:22px;object-fit:contain;margin-bottom:18px;box-shadow:0 12px 35px rgba(124,58,237,.25)}
    h1{font-size:24px;margin:0 0 8px;font-weight:900;background:linear-gradient(135deg,#fff,#A78BFA);-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
    p{color:rgba(255,255,255,.55);line-height:1.8;font-size:14px;margin:0 0 20px;}
    button{border:0;border-radius:16px;background:linear-gradient(135deg,#7C3AED,#4F46E5);color:#fff;font-family:inherit;font-weight:900;padding:13px 18px;cursor:pointer;}
  </style>
</head>
<body>
  <main class="card">
    <img src="/icon-192x192.png" alt="درايف Rent" />
    <h1>أنت بدون اتصال</h1>
    <p>يمكنك فتح الصفحات الأساسية المحفوظة. عُد للاتصال بالإنترنت لإرسال الحجوزات وتحديث السيارات.</p>
    <button onclick="location.reload()">إعادة المحاولة</button>
  </main>
</body>
</html>
