<!doctype html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover, user-scalable=no" />
    <title>درايف RENT</title>
    <meta name="description" content="تطبيق تأجير السيارات - ابحث واحجز سيارتك بكل سهولة" />
    <meta name="format-detection" content="telephone=no" />
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />

    <!-- PWA -->
    <link rel="manifest" href="/manifest.webmanifest" />
    <meta name="theme-color" content="#07080F" />
    <meta name="mobile-web-app-capable" content="yes" />

    <!-- Apple / iOS PWA -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black" />
    <meta name="apple-mobile-web-app-title" content="درايف" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <link rel="apple-touch-icon" sizes="152x152" href="/icon-152x152.png" />
    <link rel="apple-touch-icon" sizes="192x192" href="/icon-192x192.png" />

    <!-- Favicons -->
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png" />
    <link rel="shortcut icon" href="/favicon.ico" />

    <!-- Open Graph -->
    <meta property="og:title" content="درايف RENT" />
    <meta property="og:description" content="تطبيق تأجير السيارات - ابحث واحجز سيارتك بكل سهولة" />
    <meta property="og:image" content="/icon-512x512.png" />
    <meta property="og:type" content="website" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
    <!-- Service Worker Registration -->
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js?v=6.7.19')
            .then(reg => {
              console.log('[PWA] SW registered:', reg.scope);
              reg.update?.();
              if (reg.waiting) reg.waiting.postMessage('SKIP_WAITING');
              reg.addEventListener('updatefound', () => {
                const worker = reg.installing;
                worker?.addEventListener('statechange', () => {
                  if (worker.state === 'installed' && navigator.serviceWorker.controller) {
                    worker.postMessage('SKIP_WAITING');
                  }
                });
              });
            })
            .catch(err => console.warn('[PWA] SW registration failed:', err));
          navigator.serviceWorker.addEventListener('controllerchange', () => {
            if (!sessionStorage.getItem('driverent-sw-refreshed-674')) {
              sessionStorage.setItem('driverent-sw-refreshed-674', '1');
              window.location.reload();
            }
          });
        });
      }
    </script>
  </body>
</html>
